[project]
name = "codequery-cli"
version = "1.0.0"
description = "cq — semantic code query tool. 75 languages, three-tier precision."
license = {text = "Apache-2.0"}
requires-python = ">=3.8"

[project.urls]
Homepage = "https://github.com/jmfirth/codequery"
Repository = "https://github.com/jmfirth/codequery"

[project.scripts]
cq = "cq_cli:main"

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"
