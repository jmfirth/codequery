[package]
name = "codequery-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "cq"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
codequery-core = { path = "../codequery-core" }
codequery-parse = { path = "../codequery-parse" }

[dev-dependencies]
tempfile = { workspace = true }
