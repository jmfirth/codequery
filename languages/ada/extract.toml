# Ada symbol extraction rules for cq.
#
# Covers package declarations, procedure/function definitions,
# and type definitions.

[language]
name = "ada"
extensions = [".adb", ".ads"]

# Package declarations: package Foo is ... end Foo;
[[symbols]]
kind = "module"
query = '(package_declaration name: (identifier) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Procedure definitions: procedure Foo is ... end Foo;
[[symbols]]
kind = "function"
query = '(subprogram_body (procedure_specification name: (identifier) @name)) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Function definitions: function Foo return Type is ... end Foo;
[[symbols]]
kind = "function"
query = '(subprogram_body (function_specification name: (identifier) @name)) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Type definitions: type Foo is ...
[[symbols]]
kind = "type"
query = '(full_type_declaration (identifier) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"
