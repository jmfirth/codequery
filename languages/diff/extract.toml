# Diff/Patch symbol extraction rules for cq.
#
# Extracts file headers and hunk ranges from unified diff format.

[language]
name = "diff"
extensions = [".diff", ".patch"]

# File headers: --- a/file.txt / +++ b/file.txt
[[symbols]]
kind = "file"
query = '(file_change (filename) @name) @def'
name = "@name"
body = "@def"

# Hunk headers: @@ -1,3 +1,4 @@
[[symbols]]
kind = "hunk"
query = '(hunk (location) @name) @def'
name = "@name"
body = "@def"
