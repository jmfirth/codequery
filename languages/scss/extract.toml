# SCSS symbol extraction rules for cq.
#
# Covers rule sets, mixin definitions, function definitions,
# and variable declarations.

[language]
name = "scss"
extensions = [".scss"]

# Mixin definitions: @mixin foo { ... }
# mixin_statement has no "name" field; the identifier is the first child
[[symbols]]
kind = "mixin"
query = '(mixin_statement . (_) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Function definitions: @function foo() { ... }
# function_statement has no "name" field; the identifier is the first child
[[symbols]]
kind = "function"
query = '(function_statement . (_) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Variable declarations: $foo: value;
[[symbols]]
kind = "variable"
query = '(declaration (variable_name) @name) @def'
name = "@name"
body = "@def"
