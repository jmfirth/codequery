[language]
name = "swift"
extensions = [".swift"]

[[symbols]]
kind = "function"
query = '(function_declaration name: (simple_identifier) @name) @def'
name = "@name"
body = "@def"

[[symbols]]
kind = "class"
query = '(class_declaration name: (type_identifier) @name) @def'
name = "@name"
body = "@def"

# Swift uses class_declaration for structs, classes, and enums
[[symbols]]
kind = "struct"
query = '(class_declaration name: (type_identifier) @name) @def'
name = "@name"
body = "@def"
