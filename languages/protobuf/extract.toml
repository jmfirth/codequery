# Protobuf symbol extraction rules for cq.
#
# Covers message, enum, service, and rpc definitions.
# Uses tree-sitter-proto grammar (mitchellh/tree-sitter-proto).

[language]
name = "protobuf"
extensions = [".proto"]

# Message definitions: message Foo { ... }
[[symbols]]
kind = "message"
query = '(message (message_name) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Enum definitions: enum Foo { ... }
[[symbols]]
kind = "enum"
query = '(enum (enum_name) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Service definitions: service Foo { ... }
[[symbols]]
kind = "service"
query = '(service (service_name) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# RPC definitions: rpc Foo(Request) returns (Response)
[[symbols]]
kind = "function"
query = '(rpc (rpc_name) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"
