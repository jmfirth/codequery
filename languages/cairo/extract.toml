# Cairo symbol extraction rules for cq.
#
# Covers function definitions, struct definitions, trait definitions,
# and module declarations. Cairo syntax resembles Rust.

[language]
name = "cairo"
extensions = [".cairo"]

# Function definitions: fn foo() { ... }
[[symbols]]
kind = "function"
query = '(function_definition (identifier) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Struct definitions: struct Foo { ... }
[[symbols]]
kind = "struct"
query = '(struct_item name: (type_identifier) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Trait definitions: trait Foo { ... }
[[symbols]]
kind = "trait"
query = '(trait_item name: (type_identifier) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Impl blocks: impl FooImpl of FooTrait { ... }
[[symbols]]
kind = "impl"
query = '(impl_item) @def'
name = "@def"
body = "@def"

# Module declarations: mod foo { ... }
[[symbols]]
kind = "module"
query = '(mod_item name: (identifier) @name) @def'
name = "@name"
body = "@def"
