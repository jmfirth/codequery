# F# symbol extraction rules for cq.
#
# Covers let bindings, type definitions, module declarations,
# and member definitions.

[language]
name = "fsharp"
extensions = [".fs", ".fsi"]

# Function let bindings: let foo x y = ...
[[symbols]]
kind = "function"
query = '(function_or_value_defn (function_declaration_left (identifier) @name)) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Value let bindings: let foo = ...
[[symbols]]
kind = "function"
query = '(function_or_value_defn (value_declaration_left (identifier_pattern) @name)) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Type definitions: type Foo = ...
[[symbols]]
kind = "type"
query = '(type_definition (_ (type_name type_name: (identifier) @name))) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Module declarations: module Foo
[[symbols]]
kind = "module"
query = '(module_defn (identifier) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"
