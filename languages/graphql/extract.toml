# GraphQL symbol extraction rules for cq.
#
# Covers type definitions, query/mutation/subscription operations,
# interface definitions, enum definitions, and input types.

[language]
name = "graphql"
extensions = [".graphql", ".gql"]

# Type definitions: type Foo { ... }
[[symbols]]
kind = "type"
query = '(object_type_definition name: (name) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Interface definitions: interface Foo { ... }
[[symbols]]
kind = "interface"
query = '(interface_type_definition name: (name) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Enum definitions: enum Foo { ... }
[[symbols]]
kind = "enum"
query = '(enum_type_definition name: (name) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Input type definitions: input Foo { ... }
[[symbols]]
kind = "type"
query = '(input_object_type_definition name: (name) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Union definitions: union Foo = ...
[[symbols]]
kind = "type"
query = '(union_type_definition name: (name) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Scalar definitions: scalar Foo
[[symbols]]
kind = "type"
query = '(scalar_type_definition name: (name) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"
