# R symbol extraction rules for cq.
#
# R functions are defined via assignment: foo <- function(...) { ... }
# Uses tree-sitter-r grammar. Assignments are parsed as binary_operator nodes
# with lhs/rhs fields.

[language]
name = "r"
extensions = [".r", ".R"]

# Function definitions via <- or = assignment: foo <- function(...) { ... }
# Both <- and = produce binary_operator with lhs: identifier, rhs: function_definition
[[symbols]]
kind = "function"
query = '(binary_operator lhs: (identifier) @name rhs: (function_definition)) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"
