# Pascal symbol extraction rules for cq.
#
# Covers program, unit, procedure, function, type, and class definitions.
# Uses tree-sitter-pascal grammar (Isopod/tree-sitter-pascal).

[language]
name = "pascal"
extensions = [".pas", ".pp", ".lpr"]

# Program declaration: program Foo;
[[symbols]]
kind = "module"
query = '(program (moduleName) @name) @def'
name = "@name"
body = "@def"

# Unit declaration: unit Foo;
[[symbols]]
kind = "module"
query = '(unit (moduleName) @name) @def'
name = "@name"
body = "@def"

# Procedure/function definitions: procedure Foo(...); / function Foo(...): Type;
[[symbols]]
kind = "function"
query = '(defProc header: (declProc name: (identifier) @name)) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Type definitions: type Foo = ...
[[symbols]]
kind = "type"
query = '(declType name: (identifier) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"
