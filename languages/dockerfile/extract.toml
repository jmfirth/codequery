# Dockerfile symbol extraction rules for cq.
#
# Extracts FROM (base images), RUN, COPY, ENV, and ARG instructions
# as navigable symbols.

[language]
name = "dockerfile"
extensions = [".dockerfile"]
filenames = ["Dockerfile"]

# FROM instructions: FROM node:18-alpine AS builder
[[symbols]]
kind = "stage"
query = '(from_instruction (image_spec (image_name) @name)) @def'
name = "@name"
body = "@def"

# ENV instructions: ENV FOO=bar
[[symbols]]
kind = "variable"
query = '(env_instruction (env_pair name: (unquoted_string) @name)) @def'
name = "@name"
body = "@def"

# ARG instructions: ARG VERSION=1.0
[[symbols]]
kind = "variable"
query = '(arg_instruction name: (unquoted_string) @name) @def'
name = "@name"
body = "@def"

# LABEL instructions: LABEL maintainer="foo"
[[symbols]]
kind = "label"
query = '(label_instruction (label_pair key: (unquoted_string) @name)) @def'
name = "@name"
body = "@def"
