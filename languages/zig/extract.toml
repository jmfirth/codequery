[language]
name = "zig"
extensions = [".zig"]

# Function declarations: pub fn foo(...) type { ... }
[[symbols]]
kind = "function"
query = '(function_declaration (identifier) @name) @def'
name = "@name"
body = "@def"

# Variable/constant declarations: const foo = ...; var foo = ...;
[[symbols]]
kind = "variable"
query = '(variable_declaration (identifier) @name) @def'
name = "@name"
body = "@def"
