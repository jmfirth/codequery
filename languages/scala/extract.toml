[language]
name = "scala"
extensions = [".scala", ".sc"]

[[symbols]]
kind = "function"
query = '(function_definition name: (identifier) @name) @def'
name = "@name"
body = "@def"

[[symbols]]
kind = "class"
query = '(class_definition name: (identifier) @name) @def'
name = "@name"
body = "@def"

[[symbols]]
kind = "trait"
query = '(trait_definition name: (identifier) @name) @def'
name = "@name"
body = "@def"
