# Groovy symbol extraction rules for cq.
#
# Covers method definitions, class definitions, and variable declarations.
# Also useful for Gradle build files (.gradle).
# Note: tree-sitter-groovy does not have separate interface or enum node types.

[language]
name = "groovy"
extensions = [".groovy", ".gradle"]

# Function/method definitions: def foo() { ... } or void foo() { ... }
[[symbols]]
kind = "function"
query = '(function_definition function: (identifier) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Class definitions: class Foo { ... }
[[symbols]]
kind = "class"
query = '(class_definition name: (identifier) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Function declarations (without body): void foo()
[[symbols]]
kind = "function"
query = '(function_declaration function: (identifier) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"
