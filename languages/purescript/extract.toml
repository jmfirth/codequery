# PureScript symbol extraction rules for cq.
#
# Covers function definitions, data types, type classes, newtypes,
# type aliases, and module declarations.
# Uses tree-sitter-purescript grammar (postsolar/tree-sitter-purescript).

[language]
name = "purescript"
extensions = [".purs"]

# Function definitions: greet name = ...
[[symbols]]
kind = "function"
query = '(function name: (_) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Data type definitions: data Foo = ...
[[symbols]]
kind = "type"
query = '(data name: (_) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Type class definitions: class Foo where ...
[[symbols]]
kind = "class"
query = '(class_declaration (class_head (class_name) @name)) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Newtype definitions: newtype Foo = ...
[[symbols]]
kind = "type"
query = '(newtype name: (_) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Type synonym: type Foo = ...
[[symbols]]
kind = "type"
query = '(type_alias name: (_) @name) @def'
name = "@name"
body = "@def"
doc = "preceding_comment"

# Module declarations: module Foo where
[[symbols]]
kind = "module"
query = '(purescript name: (qualified_module) @name) @def'
name = "@name"
body = "@def"
