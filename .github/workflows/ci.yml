name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CQ_DATA_DIR: ${{ github.workspace }}/.cq-data

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache grammar packages
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cq-data/languages
          key: grammars-v1

      - name: Build cq binary
        if: runner.os != 'Windows'
        run: cargo build -p codequery-cli

      - name: Install grammar packages
        if: runner.os != 'Windows'
        run: ./target/debug/cq grammar install --all

      - name: Run tests
        if: runner.os != 'Windows'
        run: cargo test --workspace

      - name: Build check (Windows)
        if: runner.os == 'Windows'
        run: cargo check -p codequery-core -p codequery-parse -p codequery-index -p codequery-resolve

  build:
    name: Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --workspace --release
