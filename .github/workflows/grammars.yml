name: Grammar Packages

# Don't cancel grammar builds when other workflows run
concurrency:
  group: grammars
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - "languages/**/extract.toml"
      - "crates/codequery-resolve/tsg/**"
      - "scripts/build-grammars.sh"
      - "languages/registry.json"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (default: grammars-v1)"
        required: false
        type: string
      languages:
        description: "Space-separated list of languages to build (empty = all)"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-grammars:
    name: Build grammar packages
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq emscripten

      - name: Determine release tag
        id: tag
        run: |
          echo "tag=${{ inputs.tag || 'grammars-v1' }}" >> "$GITHUB_OUTPUT"

      - name: Build grammar packages
        run: |
          if [[ -n "${{ inputs.languages }}" ]]; then
            ./scripts/build-grammars.sh ${{ inputs.languages }}
          else
            ./scripts/build-grammars.sh
          fi

      - name: Generate checksums
        if: always()
        working-directory: dist
        run: |
          for f in lang-*.tar.gz; do
            sha256sum "$f" > "$f.sha256"
          done
          cat *.sha256 > grammar-SHA256SUMS.txt

      - name: Ensure grammar release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" \
              --title "Grammar Packages ($TAG)" \
              --notes "Pre-built WASM grammar packages for cq." \
              --prerelease
          fi

      - name: Upload grammar packages to release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "Uploading grammar packages to release $TAG..."

          # Upload each package and its checksum
          for f in dist/lang-*.tar.gz dist/lang-*.tar.gz.sha256; do
            if [[ -f "$f" ]]; then
              echo "  uploading $(basename "$f")..."
              gh release upload "$TAG" "$f" --clobber || echo "  warning: failed to upload $(basename "$f")"
            fi
          done

          # Upload combined checksum file
          if [[ -f dist/grammar-SHA256SUMS.txt ]]; then
            gh release upload "$TAG" dist/grammar-SHA256SUMS.txt --clobber || true
          fi

          echo "Done."

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grammar-packages
          path: |
            dist/lang-*.tar.gz
            dist/grammar-SHA256SUMS.txt
          retention-days: 7
